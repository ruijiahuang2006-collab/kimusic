name: Deploy to Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public release
        uses: actions/checkout@v4

      - name: Prepare Hugging Face Space files
        shell: bash
        run: |
          set -e
          rm -rf hf_space
          mkdir hf_space

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='session_results' \
            --exclude='output' \
            --exclude='_fixed_public_files' \
            --exclude='_fixed_public_files_v2' \
            --exclude='__pycache__' \
            --exclude='.env' \
            --exclude='demo_audio' \
            --exclude='figures' \
            --exclude='*.mp3' \
            --exclude='*.png' \
            --exclude='*.jpg' \
            --exclude='*.jpeg' \
            --exclude='*.webp' \
            ./ hf_space/

          cd hf_space

          # Force a stable dependency set for the original Gradio 4 app.
          # Do not let Hugging Face Spaces install newest FastAPI / Starlette / huggingface_hub.
          if [ -f requirements.txt ]; then
            grep -viE '^[[:space:]]*gradio([<=>[:space:]\[]|$)' requirements.txt > requirements_hf_1.txt || true
            grep -viE '^[[:space:]]*gradio[-_]?client([<=>[:space:]\[]|$)' requirements_hf_1.txt > requirements_hf_2.txt || true
            grep -viE '^[[:space:]]*huggingface[-_]?hub([<=>[:space:]\[]|$)' requirements_hf_2.txt > requirements_hf_3.txt || true
            grep -viE '^[[:space:]]*fastapi([<=>[:space:]\[]|$)' requirements_hf_3.txt > requirements_hf_4.txt || true
            grep -viE '^[[:space:]]*starlette([<=>[:space:]\[]|$)' requirements_hf_4.txt > requirements.txt || true
            rm -f requirements_hf_1.txt requirements_hf_2.txt requirements_hf_3.txt requirements_hf_4.txt
          else
            touch requirements.txt
          fi

          printf '\n%s\n' 'gradio==4.44.1' >> requirements.txt
          printf '%s\n' 'huggingface_hub==0.36.2' >> requirements.txt
          printf '%s\n' 'fastapi==0.112.2' >> requirements.txt
          printf '%s\n' 'starlette==0.37.2' >> requirements.txt

          echo "Final Hugging Face Space dependency pins:"
          grep -Ei '^[[:space:]]*(gradio|huggingface[-_]?hub|fastapi|starlette)' requirements.txt || true

          if [ -f README.md ]; then
            cp README.md README_body.md
          else
            touch README_body.md
          fi

          printf '%s\n' '---' > README.md
          printf '%s\n' 'title: Kimusic Demo' >> README.md
          printf '%s\n' 'emoji: 🎵' >> README.md
          printf '%s\n' 'colorFrom: blue' >> README.md
          printf '%s\n' 'colorTo: indigo' >> README.md
          printf '%s\n' 'sdk: gradio' >> README.md
          printf '%s\n' 'sdk_version: 4.44.1' >> README.md
          printf '%s\n' 'python_version: "3.10"' >> README.md
          printf '%s\n' 'app_file: app.py' >> README.md
          printf '%s\n' 'pinned: false' >> README.md
          printf '%s\n' '---' >> README.md
          printf '\n' >> README.md
          cat README_body.md >> README.md
          rm README_body.md

      - name: Push to Hugging Face Space
        shell: bash
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e
          cd hf_space
          git init
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add .
          git commit -m "Deploy Kimusic demo"
          git branch -M main
          git remote add hf https://ritalala:${HF_TOKEN}@huggingface.co/spaces/ritalala/kimusic-demo
          git push --force hf main
